name: Update KBO standings

on:
  schedule:
    - cron: '0 14 * * *'   # 매일 23:00 KST (경기 종료 후)
    - cron: '0 22 * * *'   # 매일 07:00 KST (아침 보정)
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Scrape standings
        run: node scrape.js

      - name: Commit standings.json
        run: |
          git config user.name "kbo-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add standings.json
          git commit -m "update KBO standings" || echo "변경 없음"
          git push
